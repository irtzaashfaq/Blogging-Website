name: PR Validation

on:
  pull_request:
    branches:
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Linters
        run: |
          npm install -g htmlhint stylelint stylelint-config-standard

      - name: Lint HTML files
        run: htmlhint ./src/**/*.html

      - name: Lint CSS files
        run: stylelint "**/*.css"

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Parcel
        run: npm install -g parcel

      - name: Build Project
        run: parcel build src/index.html
